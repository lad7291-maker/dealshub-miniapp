    <link rel="stylesheet" href="css/style.css?v=5">
        <!-- Mobile Fixes -->
    <style>
        @media (max-width: 768px) {
            /* Modal */
            .modal-overlay {
                padding: 0 !important;
                align-items: flex-end !important;
            }
            .modal-container {
                max-width: 100% !important;
                width: 100% !important;
                height: 100% !important;
                max-height: 100vh !important;
                border-radius: 0 !important;
                border: none !important;
            }
            .modal-content {
                grid-template-columns: 1fr !important;
                height: 100%;
            }
            .modal-image-section {
                min-height: 45vh;
                max-height: 50vh;
            }
            .modal-image-section img {
                max-height: 50vh;
                width: 100%;
                object-fit: cover;
            }
            .modal-details {
                padding: 16px;
                gap: 12px;
                overflow-y: auto;
            }
            .modal-title {
                font-size: 18px;
            }
            .modal-current-price {
                font-size: 28px;
            }
            /* Hide AI search counter on mobile */
            .ai-search-info {
                display: none !important;
            }
            /* Fix ruble symbol */
            .hero-stat-value {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;
            }
            /* Smaller hero stats */
            .hero-stats {
                gap: 16px !important;
            }
            .hero-stat-value {
                font-size: 20px !important;
            }
            .hero-stat-label {
                font-size: 10px !important;
            }
            /* Hide sticky CTA on homepage mobile */
            .sticky-cta {
                display: none !important;
            }
            body {
                padding-bottom: 0 !important;
            }
            /* Category tabs scroll */
            .category-tabs {
                gap: 6px !important;
            }
            .category-tab {
                padding: 6px 12px !important;
                font-size: 12px !important;
            }
            /* Filter section */
            .filter-section {
                padding: 10px !important;
            }
            .filter-group {
                gap: 6px !important;
            }
            .filter-btn {
                padding: 5px 10px !important;
                font-size: 12px !important;
            }
            .sort-select {
                font-size: 12px !important;
                padding: 5px 8px !important;
            }
        }
    </style>


    <style>
        .error-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; padding: 40px 20px; }
        .error-code { font-size: 6rem; font-weight: 800; color: var(--accent-orange); line-height: 1; margin-bottom: 8px; }
        .error-title { font-size: 1.5rem; color: var(--text-primary); margin-bottom: 16px; }
        .error-text { color: var(--text-secondary); max-width: 400px; margin-bottom: 32px; line-height: 1.6; }
        .error-btn { display: inline-flex; align-items: center; gap: 8px; background: var(--accent-orange); color: #fff; padding: 14px 28px; border-radius: 12px; text-decoration: none; font-weight: 600; transition: all 0.2s; }
        .error-btn:hover { background: #e55a2b; transform: translateY(-2px); }
        .error-links { display: flex; gap: 16px; margin-top: 24px; flex-wrap: wrap; justify-content: center; }
        .error-links a { color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
        .error-links a:hover { color: var(--accent-orange); }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-code">404</div>
        <h1 class="error-title">Страница не найдена</h1>
        <p class="error-text">
            Возможно, страница была удалена или ссылка устарела.<br>
            Попробуйте вернуться на главную или воспользуйтесь поиском.
        </p>
        <a href="/" class="error-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            На главную
        </a>
        <div class="error-links">
            <a href="/">Каталог товаров</a>
            <a href="about.html">О проекте</a>
            <a href="contact.html">Контакты</a>
        </div>
    </div>

    <!-- Minimal analytics (no tracking IDs in text) -->
    <script>
        // Send 404 event to analytics
        if (typeof gtag !== 'undefined') {
            gtag('event', 'page_not_found', { page_location: location.pathname });
        }
    </script>
</body>
</html>
