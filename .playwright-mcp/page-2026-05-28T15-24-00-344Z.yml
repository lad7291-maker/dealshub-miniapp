    - heading "Как экономить на покупках в AliExpress" [level=2] [ref=e1243]
    - paragraph [ref=e1244]: Используйте наш поиск по товарам или AI-поиск для подбора идеальных покупок. Добавляйте товары в избранное, чтобы вернуться к ним позже. Каждая карточка содержит реальный рейтинг, количество заказов и характеристики — никаких фейковых скидок.
    - heading "1000+ товаров с бесплатной доставкой" [level=2] [ref=e1245]
    - paragraph [ref=e1246]: В нашем каталоге более 1000 товаров с реальными скидками 20–90%. Все ссылки ведут напрямую на AliExpress через партнёрскую программу Admitad — вы получаете ту же цену, а мы небольшую комиссию за направление. Это позволяет нам поддерживать сервис и добавлять новые функции.
