name: CodeQL

# NOTE: CodeQL requires GitHub Advanced Security / code scanning enabled
# for private repositories. Enable it in Settings → Security → Code security and analysis.
# Until then, this workflow is disabled to avoid expected failures.

on:
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze JavaScript
    if: false
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
