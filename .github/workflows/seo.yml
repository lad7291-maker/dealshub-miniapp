name: SEO and Content Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  seo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate sitemap
        run: npm run build

      - name: Validate sitemap XML
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libxml2-utils
          xmllint --noout sitemap.xml
          echo "✓ sitemap.xml is valid XML"

      - name: Validate meta tags
        run: npm run validate-meta

      - name: Validate JSON-LD
        run: npm run validate-jsonld

      - name: Check broken links
        uses: lycheeverse/lychee-action@v2
        with:
          args: |
            --exclude https://www.googletagmanager.com
            --exclude https://fonts.googleapis.com
            --exclude https://fonts.gstatic.com
            --exclude https://ae01.alicdn.com
            --exclude https://aliexpress.com
            --exclude https://www.aliexpress.com
            --exclude https://*.aliexpress.com
            --timeout 30
            --max-concurrency 5
            --no-progress
            --accept 200,204,301,302,307,308,403
            .
          fail: false

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.14.x
          npx serve . -l 3000 &
          sleep 3
          lhci autorun --config=lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: lighthouse-reports
          path: ./.lighthouseci
